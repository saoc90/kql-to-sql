name: Build and Deploy Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # 1. Publish the WASM bridge (produces _framework/ with dotnet.js + WASM).
      #    NOTE: do NOT add the `wasm-tools` workload here. It relinks the runtime with WASM SIMD
      #    enabled by default, which instantiates fine on desktop but FAILS on mobile browsers that
      #    lack SIMD support — the engine then hangs on "Engine loading…". The generic prebuilt
      #    runtime (no workload) is larger but runs everywhere. Revisit optimization only with
      #    <WasmEnableSIMD>false</WasmEnableSIMD> and after verifying on a real mobile browser.
      - name: Publish KqlWasmBridge
        run: dotnet publish src/KqlWasmBridge/KqlWasmBridge.csproj -c Release -o build-wasm

      # 2. Copy _framework into the static site
      - name: Copy _framework into WebDemo
        run: cp -r build-wasm/wwwroot/_framework src/WebDemo/wwwroot/_framework

      # 3. Fix base href for GitHub Pages
      - name: Fix base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/kql-to-sql/" />|g' src/WebDemo/wwwroot/index.html

      # 4. Add .nojekyll to prevent Jekyll filtering _framework
      - name: Add .nojekyll
        run: touch src/WebDemo/wwwroot/.nojekyll

      # 5. Upload the static site
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/WebDemo/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
